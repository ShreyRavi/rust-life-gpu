<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPU Life</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A0F;
    }
    canvas {
      display: block;
    }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ccc;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">Loading GPU simulation...</div>
  <script>
    // wgpu 22 serializes its own internal limit names into requiredLimits, some of
    // which are not in the current WebGPU spec. Chrome (unlike Firefox/Safari) hard-
    // rejects requestDevice if requiredLimits contains ANY unrecognised key. We
    // whitelist every valid WebGPU spec limit name and strip the rest before the
    // call reaches the browser, so no wgpu upgrade is needed to handle future renames.
    if (typeof GPUAdapter !== 'undefined') {
      const WEBGPU_LIMIT_NAMES = new Set([
        'maxTextureDimension1D', 'maxTextureDimension2D', 'maxTextureDimension3D',
        'maxTextureArrayLayers', 'maxBindGroups', 'maxBindingsPerBindGroup',
        'maxDynamicUniformBuffersPerPipelineLayout',
        'maxDynamicStorageBuffersPerPipelineLayout',
        'maxSampledTexturesPerShaderStage', 'maxSamplersPerShaderStage',
        'maxStorageBuffersPerShaderStage', 'maxStorageTexturesPerShaderStage',
        'maxUniformBuffersPerShaderStage', 'maxUniformBufferBindingSize',
        'maxStorageBufferBindingSize', 'maxVertexBuffers', 'maxBufferSize',
        'maxVertexAttributes', 'maxVertexBufferArrayStride',
        'minUniformBufferOffsetAlignment', 'minStorageBufferOffsetAlignment',
        'maxInterStageShaderVariables', 'maxColorAttachments',
        'maxColorAttachmentBytesPerSample', 'maxComputeWorkgroupStorageSize',
        'maxComputeInvocationsPerWorkgroup', 'maxComputeWorkgroupSizeX',
        'maxComputeWorkgroupSizeY', 'maxComputeWorkgroupSizeZ',
        'maxComputeWorkgroupsPerDimension',
      ]);
      const _origRequestDevice = GPUAdapter.prototype.requestDevice;
      GPUAdapter.prototype.requestDevice = function(descriptor) {
        if (descriptor && descriptor.requiredLimits) {
          const filtered = {};
          for (const [k, v] of Object.entries(descriptor.requiredLimits)) {
            if (WEBGPU_LIMIT_NAMES.has(k)) filtered[k] = v;
          }
          descriptor = Object.assign({}, descriptor, { requiredLimits: filtered });
        }
        return _origRequestDevice.call(this, descriptor);
      };
    }
  </script>
  <script type="module">
    import init, { run_app } from './pkg/rust_life_gpu.js';

    const status = document.getElementById('status');

    if (!navigator.gpu) {
      status.textContent = 'WebGPU required. Use Chrome 113+ or Arc Browser.';
    } else {
      try {
        await init();
        status.style.display = 'none';
        run_app();
      } catch (e) {
        status.textContent =
          'WebGPU failed to initialize. Your GPU or driver may not be supported.';
        console.error(e);
      }
    }
  </script>
</body>
</html>
